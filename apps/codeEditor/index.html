<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini VSCode</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: sans-serif;
        }
        #sidebar {
            width: 260px;
            border-right: 1px solid #333;
            padding: 10px;
            box-sizing: border-box;
            background: #1e1e1e;
            color: #ccc;
        }
        #editor {
            flex: 1;
            height: 100vh;
        }
        input, button {
            width: 100%;
            margin-bottom: 6px;
            box-sizing: border-box;
        }
        h3 {
            margin: 10px 0 5px;
            font-size: 14px;
            color: #fff;
        }
        label {
            font-size: 12px;
        }
    </style>
    <!-- Monaco loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body>
    <div id="sidebar">
        <h3>Local file</h3>
        <button id="btnOpenLocal">Open local file</button>
        <button id="btnSaveLocal">Save local file</button>

        <h3>GitHub</h3>
        <label>Token (PAT):</label>
        <input id="ghToken" type="password" placeholder="ghp_...">
        <label>Owner:</label>
        <input id="ghOwner" type="text" placeholder="username">
        <label>Repo:</label>
        <input id="ghRepo" type="text" placeholder="repo-name">
        <label>Path:</label>
        <input id="ghPath" type="text" placeholder="path/to/file.js">

        <button id="btnLoadGitHub">Load from GitHub</button>
        <button id="btnSaveGitHub">Save to GitHub</button>
    </div>

    <div id="editor"></div>

    <script>
        let editor;
        let fileHandle = null;

        // --- Init Monaco ---
        require.config({
            paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }
        });

        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: "// Mini VSCode demo\n",
                language: "javascript",
                theme: "vs-dark",
                automaticLayout: true
            });
        });

        // --- Local file: open ---
        document.getElementById('btnOpenLocal').addEventListener('click', async () => {
            try {
                const [handle] = await window.showOpenFilePicker();
                fileHandle = handle;
                const file = await fileHandle.getFile();
                const text = await file.text();
                editor.setValue(text);
            } catch (err) {
                console.error(err);
                alert("Cannot open file.");
            }
        });

        // --- Local file: save ---
        document.getElementById('btnSaveLocal').addEventListener('click', async () => {
            try {
                if (!fileHandle) {
                    // nếu chưa có file, cho chọn file mới
                    fileHandle = await window.showSaveFilePicker();
                }
                const writable = await fileHandle.createWritable();
                await writable.write(editor.getValue());
                await writable.close();
                alert("Saved to local file.");
            } catch (err) {
                console.error(err);
                alert("Cannot save file.");
            }
        });

        // --- GitHub: load file ---
        document.getElementById('btnLoadGitHub').addEventListener('click', async () => {
            const token = document.getElementById('ghToken').value.trim();
            const owner = document.getElementById('ghOwner').value.trim();
            const repo  = document.getElementById('ghRepo').value.trim();
            const path  = document.getElementById('ghPath').value.trim();

            if (!token || !owner || !repo || !path) {
                alert("Fill all GitHub fields.");
                return;
            }

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                const res = await fetch(url, {
                    headers: {
                        Authorization: `Bearer ${token}`,
                        Accept: "application/vnd.github.v3+json"
                    }
                });

                if (!res.ok) {
                    throw new Error("GitHub error: " + res.status);
                }

                const data = await res.json();
                const content = atob(data.content); // base64 decode
                editor.setValue(content);

                // lưu sha để commit lại
                editor._ghMeta = { sha: data.sha };
                alert("Loaded from GitHub.");
            } catch (err) {
                console.error(err);
                alert("Cannot load from GitHub.");
            }
        });

        // --- GitHub: save file ---
        document.getElementById('btnSaveGitHub').addEventListener('click', async () => {
            const token = document.getElementById('ghToken').value.trim();
            const owner = document.getElementById('ghOwner').value.trim();
            const repo  = document.getElementById('ghRepo').value.trim();
            const path  = document.getElementById('ghPath').value.trim();

            if (!token || !owner || !repo || !path) {
                alert("Fill all GitHub fields.");
                return;
            }

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const content = editor.getValue();
            const base64Content = btoa(content);

            const body = {
                message: "Update from mini VSCode",
                content: base64Content
            };

            // nếu đã load trước đó, có sha → update
            if (editor._ghMeta && editor._ghMeta.sha) {
                body.sha = editor._ghMeta.sha;
            }

            try {
                const res = await fetch(url, {
                    method: "PUT",
                    headers: {
                        Authorization: `Bearer ${token}`,
                        Accept: "application/vnd.github.v3+json"
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    throw new Error("GitHub error: " + res.status);
                }

                const data = await res.json();
                editor._ghMeta = { sha: data.content.sha };
                alert("Saved to GitHub.");
            } catch (err) {
                console.error(err);
                alert("Cannot save to GitHub.");
            }
        });
    </script>
</body>
</html>
